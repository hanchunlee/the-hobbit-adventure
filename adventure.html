<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>比爾博的冒險 — The Hobbit</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1a1a1a;--panel:rgba(44,36,24,0.95);--border:#8b7355;
  --text:#e8d9b0;--text2:#d4c5a9;--muted:#a89070;
  --accent:#5b8fb9;--gold:#c9a435;--red:#b85c38;--green:#6a9f5b;
  --font:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
a{color:var(--accent);text-decoration:none;}

/* NAV */
#nav-bar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(26,26,26,0.9);
  backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 16px;z-index:1000;
  border-bottom:1px solid var(--border);gap:16px;}
.nav-link{color:var(--muted);font-size:0.85rem;padding:6px 10px;border-radius:6px;transition:0.2s;}
.nav-link:hover,.nav-link.active{color:var(--text);background:rgba(139,115,85,0.2);}
.nav-title{flex:1;text-align:center;color:var(--gold);font-size:0.9rem;letter-spacing:2px;}

/* MAIN LAYOUT */
#game-container{display:grid;grid-template-columns:1fr 440px;height:calc(100vh - 44px);margin-top:44px;
  padding-bottom:8px;}

/* MAP */
#map-panel{position:relative;overflow:hidden;}
#map{width:100%;height:100%;background:#1a1a1a;}

/* NARRATIVE */
#narrative-panel{display:flex;flex-direction:column;background:var(--panel);
  border-left:1px solid var(--border);overflow:hidden;position:relative;height:100%;}
#chapter-badge{position:absolute;top:12px;right:16px;background:var(--accent);
  color:#fff;font-size:0.7rem;padding:3px 10px;border-radius:10px;opacity:0.9;z-index:5;}
#scene-title{padding:20px 24px 8px;font-size:1.2rem;color:var(--gold);font-weight:bold;flex-shrink:0;}
#scene-text{flex:1;min-height:0;overflow-y:auto;padding:8px 24px 16px;font-size:0.95rem;line-height:1.8;
  color:var(--text2);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
#scene-text::-webkit-scrollbar{width:6px;}
#scene-text::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#scene-text p{margin-bottom:12px;}
.npc-dialogue{color:var(--gold);font-style:italic;}
.system-msg{color:var(--accent);font-size:0.85rem;text-align:center;padding:4px 0;}


/* CHOICES */
#choices-container{padding:12px 24px 16px;display:flex;flex-direction:column;gap:8px;
  border-top:1px solid rgba(139,115,85,0.3);flex-shrink:0;max-height:40vh;overflow-y:auto;}
.choice-btn{background:rgba(139,115,85,0.15);border:1px solid var(--border);color:var(--text);
  font-family:var(--font);font-size:0.9rem;padding:10px 16px;border-radius:8px;cursor:pointer;
  text-align:left;transition:0.2s;line-height:1.5;}
.choice-btn:hover{background:rgba(91,143,185,0.2);border-color:var(--accent);transform:translateX(4px);}
.choice-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.choice-key{display:inline-block;background:var(--border);color:var(--bg);width:20px;height:20px;
  text-align:center;border-radius:4px;font-size:0.75rem;line-height:20px;margin-right:8px;font-weight:bold;}
.choice-lock{color:var(--red);font-size:0.75rem;margin-left:6px;}

/* GAME CONTROLS */
#game-controls{position:fixed;bottom:8px;right:16px;display:flex;gap:8px;z-index:1000;}
.ctrl-btn{background:rgba(26,26,26,0.9);border:1px solid var(--border);color:var(--muted);font-size:0.75rem;
  padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--font);backdrop-filter:blur(10px);}
.ctrl-btn:hover{color:var(--text);border-color:var(--accent);}

/* TITLE SCREEN */
#title-screen{position:fixed;inset:0;background:rgba(10,10,10,0.97);z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
#title-screen.hidden{display:none;}
.ts-title{font-size:2.5rem;color:var(--gold);margin-bottom:8px;letter-spacing:4px;}
.ts-subtitle{font-size:1.3rem;color:var(--text);margin-bottom:24px;}
.ts-quote{font-size:0.9rem;color:var(--muted);font-style:italic;max-width:500px;
  margin-bottom:40px;line-height:1.8;}
.ts-btn{background:none;border:2px solid var(--border);color:var(--text);font-family:var(--font);
  font-size:1rem;padding:12px 40px;border-radius:8px;cursor:pointer;margin:6px;transition:0.2s;min-width:200px;}
.ts-btn:hover{border-color:var(--gold);color:var(--gold);}
.ts-btn:disabled{opacity:0.3;cursor:not-allowed;}
.ts-credit{position:absolute;bottom:20px;color:var(--muted);font-size:0.75rem;}

/* SAVE MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1500;display:flex;
  align-items:center;justify-content:center;}
.modal.hidden{display:none;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:24px;min-width:360px;max-width:90vw;}
.modal-title{color:var(--gold);font-size:1.1rem;margin-bottom:16px;text-align:center;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;}
.save-slot{background:rgba(139,115,85,0.1);border:1px solid rgba(139,115,85,0.3);
  padding:10px 16px;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:0.2s;}
.save-slot:hover{border-color:var(--accent);}
.save-slot-title{color:var(--text);font-size:0.9rem;}
.save-slot-info{color:var(--muted);font-size:0.75rem;margin-top:2px;}

/* ATMOSPHERE */
.atm-cozy #narrative-panel::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,164,53,0.06),transparent 70%);pointer-events:none;}
.atm-dark #narrative-panel::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.3),transparent 30%);pointer-events:none;}
.atm-forest #narrative-panel::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(30,60,20,0.15),transparent 40%);pointer-events:none;}
.atm-fire #narrative-panel::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(184,92,56,0.1),transparent 40%);pointer-events:none;}
.atm-frost #narrative-panel::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(100,150,200,0.08),transparent 40%);pointer-events:none;}
.atm-majestic #narrative-panel::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(201,164,53,0.1),transparent 60%);pointer-events:none;}

/* MOBILE */
@media(max-width:768px){
  #game-container{grid-template-columns:1fr;grid-template-rows:200px 1fr;}
  #map-panel{min-height:200px;}
  #narrative-panel{border-left:none;border-top:1px solid var(--border);}
  #nav-bar{font-size:0.75rem;}
  .ts-title{font-size:1.8rem;}
  .equip-box,.modal-box{min-width:90vw;}
}

/* PLAYER MARKER */
.player-marker{width:28px;height:28px;background:radial-gradient(circle at 40% 40%,#5b8fb9,#2a5f8a);
  border:3px solid #e8d9b0;border-radius:50%;box-shadow:0 0 12px rgba(91,143,185,0.6);
  animation:pulse 2s ease-in-out infinite;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:bold;color:#fff;}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(91,143,185,0.6);}50%{box-shadow:0 0 20px rgba(91,143,185,0.9);}}

/* TYPEWRITER */
.typewriter{overflow:hidden;border-right:2px solid var(--gold);animation:blink 0.7s step-end infinite;}
@keyframes blink{50%{border-color:transparent;}}

/* SCENE ART */
#scene-art{width:100%;height:280px;position:relative;overflow:hidden;flex-shrink:0;
  border-bottom:1px solid rgba(139,115,85,0.3);}
#scene-art .art-bg{position:absolute;inset:0;}
#scene-art .art-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
#scene-art .art-emoji svg{width:100%;height:100%;display:block;}
#scene-art .art-caption{position:absolute;bottom:4px;left:0;right:0;text-align:center;
  font-size:0.7rem;color:rgba(232,217,176,0.6);letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
.art-cozy .art-bg{background:linear-gradient(180deg,#3d2e1a 0%,#2a1f10 60%,#1a1a1a 100%);}
.art-dark .art-bg{background:linear-gradient(180deg,#0a0a0a 0%,#151520 60%,#1a1a1a 100%);}
.art-forest .art-bg{background:linear-gradient(180deg,#1a2e14 0%,#0f1a0a 60%,#1a1a1a 100%);}
.art-fire .art-bg{background:linear-gradient(180deg,#3d1a0a 0%,#2a0f05 60%,#1a1a1a 100%);}
.art-frost .art-bg{background:linear-gradient(180deg,#1a2535 0%,#0f1520 60%,#1a1a1a 100%);}
.art-majestic .art-bg{background:linear-gradient(180deg,#2a2540 0%,#1a1530 60%,#1a1a1a 100%);}
</style>
</head>
<body>

<nav id="nav-bar">
  <a class="nav-link" href="index.html">🗺︎ 地圖</a>
  <a class="nav-link active" href="adventure.html">⚔ 冒險</a>
  <span class="nav-title">中土世界</span>
  <a class="nav-link" href="timeline.html">⏳︎ 時間軸</a>
</nav>

<main id="game-container">
  <div id="map-panel"><div id="map"></div></div>
  <div id="narrative-panel">
    <div id="chapter-badge"></div>
    <h2 id="scene-title"></h2>
    <div id="scene-art"><div class="art-bg"></div><div class="art-emoji"></div><div class="art-caption"></div></div>
    <div id="scene-text"></div>
    <div id="choices-container"></div>
  </div>
</main>

<div id="game-controls">
  <button class="ctrl-btn" id="btn-save">存檔</button>
  <button class="ctrl-btn" id="btn-load">讀檔</button>
</div>

<div id="title-screen">
  <div class="ts-title">◆ The Hobbit ◆</div>
  <div class="ts-subtitle">哈比人冒險記</div>
  <div class="ts-quote">「在地底的一個洞裡，住著一個哈比人。那可不是什麼令人討厭、潮濕、骯髒的洞，到處都是蚯蚓和散發著泥臭味的氣息；這也不是個乾燥、光禿禿、沙質的洞，裡面沒有任何可以讓你坐下來或吃東西的東西。這是一個哈比人的洞，而哈比人的洞就意味著舒適。」</div>
  <button class="ts-btn" id="ts-new">開始新冒險</button>
  <button class="ts-btn" id="ts-continue" disabled>繼續冒險</button>
  <button class="ts-btn" id="ts-load">讀取存檔</button>
  <div class="ts-credit">基於 J.R.R. 托爾金《哈比人冒險記》| 建構於中土世界互動地圖</div>
</div>

<div class="modal hidden" id="save-modal">
  <div class="modal-box">
    <button class="modal-close" id="save-modal-close">&times;</button>
    <div class="modal-title" id="save-modal-title">存檔</div>
    <div id="save-slots"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="adventure-data.js"></script>
<script src="scene-art.js"></script>
<script>
/* ═══════════════════════════════════════════
   GAME ENGINE — 中土世界文字冒險
   ═══════════════════════════════════════════ */

// ── State ──
const G = {
  scene: null, flags: new Set(),
  visited: [], choices: {}, playTime:0, startTime:0,
  party: ['bilbo']
};

// ── Party Characters ──
const CHARACTERS = {
  bilbo:     { name:'比爾博',   emoji:'🧑‍🌾', color:'#5b8fb9' },
  gandalf:   { name:'甘道夫',   emoji:'🧙',   color:'#7b68ee' },
  thorin:    { name:'索林',     emoji:'👑',   color:'#c9a435' },
  balin:    { name:'巴林',     emoji:'📜',   color:'#a89070' },
  dwalin:   { name:'瓦林',     emoji:'⚔️',   color:'#b85c38' },
  fili:     { name:'菲力',     emoji:'🏹',   color:'#6a9f5b' },
  kili:     { name:'奇力',     emoji:'🎯',   color:'#6a9f5b' },
  bombur:   { name:'邦伯',     emoji:'🍖',   color:'#d4a574' },
  bofur:    { name:'波佛',     emoji:'🎵',   color:'#8b7355' },
  bifur:    { name:'畢佛',     emoji:'🔨',   color:'#8b7355' },
  ori:      { name:'歐力',     emoji:'📖',   color:'#a0a0a0' },
  nori:     { name:'諾力',     emoji:'🗝️',   color:'#a0a0a0' },
  dori:     { name:'朵力',     emoji:'🫖',   color:'#a0a0a0' },
  oin:      { name:'歐因',     emoji:'🩹',   color:'#a0a0a0' },
  gloin:    { name:'葛羅音',   emoji:'🔥',   color:'#a0a0a0' }
};

// ── Leaflet Map ──
let map, playerMarker, progressPath;
// IMG_W, IMG_H 已在 data.js 定義
function toLatLng(px,py){ return [py,px]; }

function buildBilboIcon(){
  return '<div class="player-marker">🧑‍🌾</div>';
}

function initMap(){
  const MapCRS = L.Util.extend({}, L.CRS.Simple, {
    transformation: new L.Transformation(1, 0, 1, 0)
  });
  const bounds = [[0, 0], [IMG_H, IMG_W]];
  map = L.map('map',{
    crs: MapCRS, minZoom:-4, maxZoom:3, zoomSnap:0.25, zoomDelta:0.5,
    wheelPxPerZoomLevel:120, attributionControl:false
  });
  const tileOpts = {
    minZoom:-4, maxZoom:3, maxNativeZoom:0, minNativeZoom:-2,
    zoomOffset:2, tileSize:256, noWrap:true, bounds:bounds
  };
  L.tileLayer('tiles/{z}/{x}/{y}.jpg', tileOpts).addTo(map);
  map.fitBounds(bounds);
  const PAD = Math.max(IMG_W, IMG_H);
  map.setMaxBounds([[-PAD,-PAD],[IMG_H+PAD,IMG_W+PAD]]);
  L.control.zoom({position:'topleft'}).addTo(map);
  map.setView(toLatLng(3500,1100),-1);

  const icon = L.divIcon({className:'',html:buildBilboIcon(),iconSize:[32,32],iconAnchor:[16,16]});
  playerMarker = L.marker(toLatLng(2746,1115),{icon}).addTo(map);
}

function movePlayer(px,py,zoom){
  const ll = toLatLng(px,py);
  playerMarker.setLatLng(ll);
  map.flyTo(ll, zoom||0, {duration:1.2});
}

function drawProgress(upToPx,upToPy){
  if(!JOURNEYS||!JOURNEYS.bilbo) return;
  const pts = JOURNEYS.bilbo.points;
  if(progressPath) map.removeLayer(progressPath);
  // find nearest point
  let best=0, bestD=Infinity;
  for(let i=0;i<pts.length;i++){
    const d=Math.hypot(pts[i][0]-upToPx,pts[i][1]-upToPy);
    if(d<bestD){bestD=d;best=i;}
  }
  const seg = pts.slice(0,best+1).map(p=>toLatLng(p[0],p[1]));
  seg.push(toLatLng(upToPx,upToPy));
  progressPath = L.polyline(seg,{color:'#5b8fb9',weight:3,opacity:0.7,dashArray:'8,4'}).addTo(map);
}

// ── Scene Rendering ──
function enterScene(id){
  const sc = SCENES[id];
  if(!sc){ console.error('Scene not found:',id); return; }
  G.scene = id;
  if(!G.visited.includes(id)) G.visited.push(id);

  // atmosphere
  document.body.className = sc.atmosphere ? 'atm-'+sc.atmosphere : '';

  // chapter badge
  const badge = document.getElementById('chapter-badge');
  badge.textContent = sc.chapterTitle ? `第${sc.chapter}章 ${sc.chapterTitle}` : '';

  // title
  document.getElementById('scene-title').textContent = sc.title||'';

  // scene art
  renderSceneArt(sc);

  // text with typewriter
  const st = document.getElementById('scene-text');
  st.innerHTML = '';
  const paragraphs = (sc.text||'').split('\n').filter(p=>p.trim());
  paragraphs.forEach(p=>{
    const el = document.createElement('p');
    el.innerHTML = formatText(p);
    st.appendChild(el);
  });
  st.scrollTop = 0;

  // move map
  if(sc.location){
    movePlayer(sc.location.px, sc.location.py, sc.location.zoom||0);
    drawProgress(sc.location.px, sc.location.py);
  }

  // choices
  renderChoices(sc);

  // auto-save
  autoSave();

  // scene enter effects
  if(sc.onEnter){
    const oe = sc.onEnter;
    if(oe.addFlag) (Array.isArray(oe.addFlag)?oe.addFlag:[oe.addFlag]).forEach(f=>G.flags.add(f));
    if(oe.addParty){
      const newMembers = Array.isArray(oe.addParty)?oe.addParty:[oe.addParty];
      newMembers.forEach(m=>{ if(!G.party.includes(m)){ G.party.push(m); showMsg(`${CHARACTERS[m]?.name||m} 加入了隊伍！`); } });
    }
  }
}

function formatText(t){
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\「(.*?)\」/g,'<span class="npc-dialogue">「$1」</span>')
    .replace(/\[(.*?)\]/g,'<span class="system-msg">[$1]</span>');
}

// ── Scene Art ──
const SCENE_ART = {
  cozy:     { bg:'cozy',     emojis:['🏠','🫖','🔥','🕯️','📚','🥧'], captions:['袋底洞','舒適的洞穴','溫暖的爐火'] },
  dark:     { bg:'dark',     emojis:['🦇','👁️','⛓️','💀','🌑','🕳️'], captions:['黑暗深處','未知的恐懼','陰影籠罩'] },
  forest:   { bg:'forest',   emojis:['🌲','🕸️','🦌','🌿','🍂','🍄'], captions:['古老森林','樹影幢幢','林間小徑'] },
  fire:     { bg:'fire',     emojis:['🔥','⚔️','🐉','💥','🌋','🩸'], captions:['烈焰燃燒','戰火紛飛','龍焰肆虐'] },
  frost:    { bg:'frost',    emojis:['❄️','🏔️','🌬️','🧊','⛰️','🌨️'], captions:['冰天雪地','寒風刺骨','雪山之巔'] },
  majestic: { bg:'majestic', emojis:['🏰','✨','🌈','👑','💎','🌟'], captions:['精靈殿堂','璀璨光輝','宏偉壯麗'] }
};

function renderSceneArt(sc){
  const art = document.getElementById('scene-art');
  const atm = sc.atmosphere || 'dark';
  art.className = 'art-' + atm;
  // 使用場景插圖（圖片 > SVG > emoji）
  if(typeof getSceneHTML === 'function'){
    art.querySelector('.art-emoji').innerHTML = getSceneHTML(G.scene, atm);
  } else if(typeof getSceneSVG === 'function'){
    art.querySelector('.art-emoji').innerHTML = getSceneSVG(G.scene, atm);
  } else {
    const data = SCENE_ART[atm] || SCENE_ART.dark;
    const hash = (sc.title||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    art.querySelector('.art-emoji').textContent = sc.artEmoji || data.emojis[hash % data.emojis.length];
  }
  // caption
  const data = SCENE_ART[atm] || SCENE_ART.dark;
  const hash = (sc.title||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  art.querySelector('.art-caption').textContent = sc.artCaption || data.captions[hash % data.captions.length];
}

function renderChoices(sc){
  const ctn = document.getElementById('choices-container');
  ctn.innerHTML = '';
  const choices = (sc.choices||[]).filter(c=>{
    if(!c.condition) return true;
    return checkCondition(c.condition);
  });
  choices.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const lockReason = c.condition && !checkCondition(c.condition) ? getLockReason(c.condition) : '';
    btn.innerHTML = `<span class="choice-key">${i+1}</span>${c.text}${lockReason?`<span class="choice-lock">🔒${lockReason}</span>`:''}`;
    if(lockReason) btn.disabled = true;
    btn.onclick = ()=> processChoice(c);
    ctn.appendChild(btn);
  });
}

function processChoice(c){
  const cs = c.consequences || {};
  if(cs.addFlag) (Array.isArray(cs.addFlag)?cs.addFlag:[cs.addFlag]).forEach(f=>G.flags.add(f));
  if(cs.removeFlag) (Array.isArray(cs.removeFlag)?cs.removeFlag:[cs.removeFlag]).forEach(f=>G.flags.delete(f));
  if(cs.setChoice) Object.assign(G.choices, cs.setChoice);
  if(c.nextScene) enterScene(c.nextScene);
}

// ── Conditions ──
function checkCondition(c){
  if(!c) return true;
  if(c.hasFlag) return G.flags.has(c.hasFlag);
  if(c.notFlag) return !G.flags.has(c.notFlag);
  if(c.visited) return G.visited.includes(c.visited);
  if(c.all) return c.all.every(x=>checkCondition(x));
  if(c.any) return c.any.some(x=>checkCondition(x));
  return true;
}

function getLockReason(c){
  if(c.hasFlag) return '尚未達成';
  return '條件不足';
}

// ── Messages ──
function showMsg(text){
  const st = document.getElementById('scene-text');
  const el = document.createElement('p');
  el.className = 'system-msg';
  el.textContent = `[${text}]`;
  st.appendChild(el);
  st.scrollTop = st.scrollHeight;
}

// ── Save/Load ──
const SAVE_KEY = 'hobbit-adventure';

function getState(){
  return { v:3, t:Date.now(), scene:G.scene, flags:[...G.flags],
    visited:G.visited, choices:G.choices, pt:G.playTime, party:G.party };
}

function loadState(s){
  G.scene=s.scene; G.flags=new Set(s.flags||[]);
  G.visited=s.visited||[]; G.choices=s.choices||{}; G.playTime=s.pt||0;
  G.party=s.party||['bilbo'];
  enterScene(G.scene);
}

function autoSave(){
  localStorage.setItem(SAVE_KEY+'-auto', JSON.stringify(getState()));
}

function hasSave(){
  return !!localStorage.getItem(SAVE_KEY+'-auto');
}

function showSaveModal(mode){
  const modal = document.getElementById('save-modal');
  document.getElementById('save-modal-title').textContent = mode==='save'?'存檔':'讀檔';
  const slots = document.getElementById('save-slots');
  let html = '';
  // auto save
  const auto = localStorage.getItem(SAVE_KEY+'-auto');
  if(auto && mode==='load'){
    const s = JSON.parse(auto);
    const sc = SCENES[s.scene];
    html += `<div class="save-slot" onclick="loadSlot('auto')">
      <div class="save-slot-title">自動存檔</div>
      <div class="save-slot-info">第${sc?sc.chapter:'?'}章 ${sc?sc.title:''} | ${new Date(s.t).toLocaleString()}</div></div>`;
  }
  for(let i=1;i<=3;i++){
    const data = localStorage.getItem(SAVE_KEY+'-slot-'+i);
    if(data){
      const s = JSON.parse(data);
      const sc = SCENES[s.scene];
      html += `<div class="save-slot" onclick="${mode==='save'?`saveToSlot(${i})`:`loadSlot(${i})`}">
        <div class="save-slot-title">存檔 ${i}</div>
        <div class="save-slot-info">第${sc?sc.chapter:'?'}章 ${sc?sc.title:''} | ${new Date(s.t).toLocaleString()}</div></div>`;
    } else {
      html += `<div class="save-slot" onclick="${mode==='save'?`saveToSlot(${i})`:''}">
        <div class="save-slot-title">存檔 ${i}</div>
        <div class="save-slot-info">— 空 —</div></div>`;
    }
  }
  slots.innerHTML = html;
  modal.classList.remove('hidden');
}

function saveToSlot(n){
  localStorage.setItem(SAVE_KEY+'-slot-'+n, JSON.stringify(getState()));
  document.getElementById('save-modal').classList.add('hidden');
  showMsg('存檔完成');
}

function loadSlot(n){
  const data = localStorage.getItem(SAVE_KEY+(n==='auto'?'-auto':'-slot-'+n));
  if(data){
    document.getElementById('save-modal').classList.add('hidden');
    document.getElementById('title-screen').classList.add('hidden');
    loadState(JSON.parse(data));
  }
}

// ── Init ──
function init(){
  // 先綁定按鈕事件（確保即使地圖載入失敗也能玩）
  document.getElementById('ts-new').onclick = ()=>{
    document.getElementById('title-screen').classList.add('hidden');
    enterScene('intro');
  };
  document.getElementById('ts-continue').onclick = ()=>{
    const data = localStorage.getItem(SAVE_KEY+'-auto');
    if(data){
      document.getElementById('title-screen').classList.add('hidden');
      loadState(JSON.parse(data));
    }
  };
  if(hasSave()) document.getElementById('ts-continue').disabled = false;
  document.getElementById('ts-load').onclick = ()=> showSaveModal('load');

  // game controls
  document.getElementById('btn-save').onclick = ()=> showSaveModal('save');
  document.getElementById('btn-load').onclick = ()=> showSaveModal('load');
  document.getElementById('save-modal-close').onclick = ()=> document.getElementById('save-modal').classList.add('hidden');

  // keyboard shortcuts
  document.addEventListener('keydown', e=>{
    if(e.key>='1' && e.key<='9'){
      const btns = document.querySelectorAll('.choice-btn:not(.disabled)');
      const idx = parseInt(e.key)-1;
      if(btns[idx]) btns[idx].click();
    }
    if(e.key==='Escape'){
      document.getElementById('save-modal').classList.add('hidden');
    }
  });

  // 初始化地圖（允許失敗）
  try { initMap(); } catch(e) { console.warn('地圖載入失敗:', e); }
}

document.addEventListener('DOMContentLoaded', init);
</script>
